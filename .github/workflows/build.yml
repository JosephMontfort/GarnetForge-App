name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-release:
    name: Signed Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - run: chmod +x gradlew
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > ${{ runner.temp }}/garnetforge.jks
      - name: Write keystore.properties
        run: |
          cat > keystore.properties << EOF2
          KEYSTORE_PATH=${{ runner.temp }}/garnetforge.jks
          KEYSTORE_PASS=${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASS=${{ secrets.KEY_PASS }}
          EOF2
      - run: ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: GarnetForge-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90
